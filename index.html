    <script>
      // Restore path encoded by 404.html redirect (SPA routing on GitHub Pages)
      (function () {
        var qs = window.location.search;
        if (qs[1] === '/') {
          var parts = qs.slice(1).split('&').map(function (s) {
            return s.replace(/~and~/g, '&');
          });
          window.history.replaceState(
            null, null,
            parts[0] + (parts[1] ? '&' + parts[1] : '') + window.location.hash
          );
        }
      })();
    </script>
